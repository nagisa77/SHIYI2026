<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SHIYI 2026</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17211b;
        --muted: #56635c;
        --paper: #fbfaf6;
        --line: #d7ddd6;
        --green: #1f7a4d;
        --gold: #c7922e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(120deg, rgba(31, 122, 77, 0.1), transparent 38%),
          linear-gradient(300deg, rgba(199, 146, 46, 0.13), transparent 42%),
          var(--paper);
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 20px;
      }

      .page {
        width: min(920px, 100%);
      }

      .mark {
        display: inline-grid;
        width: 64px;
        height: 64px;
        margin-bottom: 28px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffffb8;
        box-shadow: 0 18px 40px rgba(23, 33, 27, 0.08);
        color: var(--green);
        font-size: 24px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(48px, 10vw, 112px);
        line-height: 0.92;
        letter-spacing: 0;
      }

      p {
        max-width: 560px;
        margin: 28px 0 0;
        color: var(--muted);
        font-size: clamp(18px, 2.6vw, 22px);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 36px;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 18px;
        color: #fff;
        background: var(--green);
        font-weight: 700;
        text-decoration: none;
      }

      a.secondary {
        border-color: var(--line);
        color: var(--ink);
        background: #ffffffc7;
      }

      .strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 56px;
      }

      .tile {
        min-height: 96px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.45)),
          repeating-linear-gradient(
            135deg,
            rgba(31, 122, 77, 0.16) 0 8px,
            rgba(199, 146, 46, 0.12) 8px 16px
          );
      }

      .tile:nth-child(2) {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.4)),
          repeating-linear-gradient(
            90deg,
            rgba(23, 33, 27, 0.12) 0 7px,
            rgba(31, 122, 77, 0.1) 7px 14px
          );
      }

      .tile:nth-child(3) {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.4)),
          repeating-linear-gradient(
            45deg,
            rgba(199, 146, 46, 0.18) 0 7px,
            rgba(23, 33, 27, 0.08) 7px 15px
          );
      }

      @media (max-width: 640px) {
        main {
          place-items: start center;
          padding-top: 72px;
        }

        .strip {
          grid-template-columns: 1fr;
          margin-top: 40px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="page" aria-label="SHIYI 2026 GitHub Pages preview">
        <div class="mark" aria-hidden="true">十</div>
        <h1>SHIYI 2026</h1>
        <p>一个非常简单的 GitHub Pages 单页预览。页面已经准备好从仓库根目录直接发布。</p>
        <div class="actions">
          <a href="https://github.com/nagisa77/SHIYI2026">查看仓库</a>
          <a class="secondary" href="http://www.chenjiating.com/SHIYI2026/">打开页面</a>
        </div>
        <div class="strip" aria-hidden="true">
          <div class="tile"></div>
          <div class="tile"></div>
          <div class="tile"></div>
        </div>
      </section>
    </main>
  </body>
</html>
